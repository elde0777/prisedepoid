<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#f97316"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="GainMode"/>
    <meta name="description" content="GainMode - Suivi nutrition et sport pour prise de masse"/>
    <link rel="manifest" href="/manifest.json"/>
    <link rel="apple-touch-icon" href="/icon-192.png"/>
    <title>GainMode</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #050510; color: #f1f5f9; font-family: system-ui, sans-serif; }
      #splash {
        position: fixed; inset: 0; background: #050510;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-logo {
        font-size: 52px; font-weight: 900;
        color: #f97316; letter-spacing: 4px;
        margin-bottom: 6px;
      }
      .splash-tag {
        font-size: 13px; color: #6b7280;
        letter-spacing: 3px; margin-bottom: 48px;
        text-transform: uppercase;
      }
      .bar-wrap {
        width: 180px; height: 4px;
        background: #1f2937; border-radius: 2px; overflow: hidden;
      }
      .bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #f97316, #fbbf24);
        border-radius: 2px;
        transition: width 0.05s linear;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">GainMode</div>
      <div class="splash-tag">Built Different</div>
      <div class="bar-wrap">
        <div class="bar" id="splash-bar"></div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Animate bar progressively
      let pct = 0;
      const bar = document.getElementById('splash-bar');
      const interval = setInterval(() => {
        pct = Math.min(pct + 2, 90);
        if (bar) bar.style.width = pct + '%';
      }, 40);

      // Hide splash once React has rendered into #root
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          clearInterval(interval);
          if (bar) bar.style.width = '100%';
          setTimeout(() => {
            const splash = document.getElementById('splash');
            if (splash) {
              splash.classList.add('hidden');
              setTimeout(() => splash.remove(), 650);
            }
          }, 300);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });

      // Fallback: hide after 5s no matter what
      setTimeout(() => {
        clearInterval(interval);
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 650);
        }
      }, 5000);

      // PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
